<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mac Style Expand Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f4f4f5;
            min-height: 100vh;
            /* Dummy background text to show overlay effect */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a1a1aa;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            opacity: 0.2;
        }

        /* --- DUMMY THUMB NAV BTM --- */
        .thumb-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .nav-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .nav-btn:hover {
            transform: scale(1.05);
            background: #0070f3;
        }

        /* --- THE MAC WINDOW (MODAL) --- */
        .mac-window {
            position: fixed;
            background: #ffffff;
            z-index: 9999;
            overflow: hidden; /* Content bahar na nikle animation ke doran */
            opacity: 0;
            pointer-events: none; /* Band hone par click na ho */
            
            /* SUPER SMOOTH SPRING ANIMATION */
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        /* --- MAC HEADER & CLOSE DOT --- */
        .mac-header {
            padding: 15px 20px;
            background: #f5f5f5;
            border-bottom: 1px solid #eaeaea;
            display: flex;
            align-items: center;
        }

        .mac-close-dot {
            width: 15px;
            height: 15px;
            background-color: #ff5f56;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: inset 0 0 4px rgba(0,0,0,0.1);
        }

        .mac-close-dot:hover {
            background-color: #e0443e;
        }

        /* --- MODAL CONTENT --- */
        .mac-content {
            padding: 40px;
            flex-grow: 1;
            overflow-y: auto; /* Agar content zyada ho toh scroll ho */
        }

        .mac-content h2 {
            font-size: 2.5rem;
            color: #000;
            margin-bottom: 10px;
        }

        .mac-content p {
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <h1>MAIN WEBSITE CONTENT</h1>

    <div class="thumb-nav">
        <button class="nav-btn">Home</button>
        <button class="nav-btn">Services</button>
        <button id="team-btn" class="nav-btn">📁 Team</button>
    </div>

    <div id="team-modal" class="mac-window">
        <div class="mac-header">
            <button id="close-modal" class="mac-close-dot" title="Close Window"></button>
            <span style="margin-left: 15px; font-size: 13px; font-weight: 600; color: #888;">CodeCrafte Team.html</span>
        </div>
        <div class="mac-content">
            <h2>Meet The Experts</h2>
            <p>Bhai! Dekha tu ne? Main bilkul us neeche wale button ke andar se nikal kar aaya hoon. Aur jaise hi tu red dot (close) par click karega, main wapis usi button ke andar chala jaunga.</p>
        </div>
    </div>

    <script>
        const teamBtn = document.getElementById('team-btn');
        const modal = document.getElementById('team-modal');
        const closeBtn = document.getElementById('close-modal');

        teamBtn.addEventListener('click', () => {
            // 1. Button ki current position and size pata karo
            const rect = teamBtn.getBoundingClientRect();

            // 2. Modal ko button ki exact jagah aur shape de do (invisible state mein)
            modal.style.top = rect.top + 'px';
            modal.style.left = rect.left + 'px';
            modal.style.width = rect.width + 'px';
            modal.style.height = rect.height + 'px';
            modal.style.borderRadius = '30px'; 
            
            // 3. Pointer events on karo taake baad mein click ho sake
            modal.style.pointerEvents = 'auto';

            // 4. Force browser to register these initial positions before animating
            modal.offsetHeight; 

            // 5. Ab modal ko Full Screen hone ka command do! (CSS transition isko smooth banayegi)
            modal.style.opacity = '1';
            modal.style.top = '0px';
            modal.style.left = '0px';
            modal.style.width = '100vw';
            modal.style.height = '100vh';
            modal.style.borderRadius = '0px';

            // 6. Peeche website ka scroll band kar do
            document.body.style.overflow = 'hidden';
        });

        closeBtn.addEventListener('click', () => {
            // 1. Wapis jane ke liye button ki jagah dobara check karo (agar user ne screen resize ki ho)
            const rect = teamBtn.getBoundingClientRect();

            // 2. Modal ko wapis button ke size aur jagah par shrink karo
            modal.style.top = rect.top + 'px';
            modal.style.left = rect.left + 'px';
            modal.style.width = rect.width + 'px';
            modal.style.height = rect.height + 'px';
            modal.style.borderRadius = '30px';
            modal.style.opacity = '0';

            // 3. Pointer events band kar do aur website ka scroll wapis on kar do
            modal.style.pointerEvents = 'none';
            document.body.style.overflow = 'auto';
        });
    </script>
</body>
</html>
