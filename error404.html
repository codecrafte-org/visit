<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>error 404</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --blue: #0070f3; --black: #000; --white: #fff; --gray: #888; --bg: #fdfdfd; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--black);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Custom Navbar (As per your image) --- */
        nav {
            width: 100%;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            z-index: 100;
        }

        .logo img { height: 40px; }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a { 
            text-decoration: none; 
            color: var(--black); 
            font-size: 14px; 
            font-weight: 500; 
            opacity: 0.7;
            transition: 0.3s;
        }
        .nav-links a:hover { opacity: 1; }

        .btn-contact {
            background: var(--black);
            color: var(--white);
            padding: 10px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        /* --- 404 Content (Scaled Down for Premium Look) --- */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 80px;
        }

        .error-container {
            max-width: 450px; /* Chota size for premium feel */
            text-align: center;
            padding: 20px;
        }

        .error-img {
            width: 180px; /* Reduced size */
            height: auto;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .error-code {
            font-family:  sans-serif;
            font-size: 4rem; /* Realistic size */
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .error-msg {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .instructions {
            font-size: 0.9rem;
            color: var(--gray);
            line-height: 1.5;
        }

        /* --- Toast Notification (Black & Professional) --- */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--black);
            color: var(--white);
            padding: 12px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        #toast.show { transform: translateX(-50%) translateY(0); }
        .toast-icon { display: flex; align-items: center; }

        /* --- Mobile View Adjustments --- */
        @media (max-width: 768px) {
            nav { justify-content: center; padding: 15px; }
            .nav-links, .btn-contact { display: none; } /* Sirf logo rahay ga */
            .error-code { font-size: 3.5rem; }
            .error-img { width: 150px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <img src="./images/fav-ion.webp" alt="CodeCrafte">
        </div>
        <div class="nav-links">
            <a href="#">Our Team</a>
            <a href="#">Our Story</a>
            <a href="#">Careers</a>
        </div>
        <a href="#" class="btn-contact">Contact Us</a>
    </nav>

    <div class="main-content">
        <div class="error-container">
            <img src="../images/404.png" alt="Lost" class="error-img">
            <div class="error-code">404</div>
            <h2 class="error-msg">Offline Mode</h2>
            <p class="instructions">
                It looks like your connection has been interrupted. <br>
                Please check your internet settings.
            </p>
        </div>
    </div>

    <div id="toast">
        <div class="toast-icon" id="t-icon"></div>
        <span id="t-msg">Notification Message</span>
    </div>

     <script>
    lucide.createIcons();
    const toast = document.getElementById('toast');
    const tMsg = document.getElementById('t-msg');
    const tIcon = document.getElementById('t-icon');

    // Function to show/hide toast
    function showToast(status) {
        if (status === 'offline') {
            tMsg.innerText = "Connection lost. Checking your network...";
            tIcon.innerHTML = '<i data-lucide="wifi-off" style="color:#ff4b4b; width:18px;"></i>';
            toast.classList.add('show');
        } else {
            tMsg.innerText = "Connection restored. Redirecting...";
            tIcon.innerHTML = '<i data-lucide="wifi" style="color:#00ff88; width:18px;"></i>';
            toast.classList.add('show');
            
            // Net wapis aane par hi redirect hoga
            setTimeout(() => {
                window.location.href = "index.html"; 
            }, 2000);
        }
        lucide.createIcons();
    }

    // --- EVENTS ---

    // 1. Jab net jaye
    window.addEventListener('offline', () => {
        showToast('offline');
    });

    // 2. Jab net wapis aaye
    window.addEventListener('online', () => {
        showToast('online');
    });

    // 3. Mobile par "Self-Redirect" wala ganda logic nikaal diya hai.
    // Ab ye tab tak wahin rahay ga jab tak net wapis nahi aata ya aap manually back nahi jatay.
</script>
</body>
</html>
