    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
            --accent: #0070f3;
            --gray: #f4f4f4;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--white); 
            font-family: 'Space Grotesk', sans-serif; 
            color: var(--black);
            padding-bottom: 150px; /* Space for Bottom Nav */
            overflow-x: hidden;
        }

        /* --- MAGNETIC FLOATING BOTTOM NAV (Unchanged) --- */
        .bottom-nav-wrap {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); z-index: 1000;
            width: 90%; max-width: 500px;
        }
        .bottom-nav {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 40px;
            display: flex; justify-content: space-around;
            padding: 15px 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .nav-item {
            text-decoration: none; color: #666;
            display: flex; flex-direction: column; align-items: center;
            gap: 5px; font-size: 0.7rem; font-weight: 700; transition: 0.3s;
        }
        .nav-item i { width: 22px; height: 22px; stroke-width: 2.5px; }
        .nav-item.active { color: var(--black); }
        .nav-item:hover { color: var(--accent); transform: translateY(-5px); }

        /* --- AMAZING LIQUID GRADIENT HEADING ANIMATION --- */
        .hero-section {
            text-align: center; padding: 120px 5% 60px;
            perspective: 1000px; /* For potential 3D effects */
        }

        .animated-heading {
            font-size: clamp(2.8rem, 10vw, 6rem);
            line-height: 0.85;
            text-transform: uppercase;
            font-weight: 700;
            background: linear-gradient(
                to right,
                #000 20%,
                #0070f3 30%,
                #ff0080 70%,
                #000 80%
            );
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: liquidGradient 6s linear infinite;
            display: inline-block; /* Essential for text clipping */
            position: relative;
        }

        @keyframes liquidGradient {
            0% { background-position: 0% center; }
            100% { background-position: -200% center; }
        }

        /* Text drift effect on hover */
        .animated-heading:hover {
            animation: liquidGradient 2s linear infinite, textDrift 0.5s ease;
        }

        @keyframes textDrift {
            0% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0); }
        }

        .hero-section p {
            font-size: 1.3rem; color: #555; max-width: 650px; margin: 30px auto 0;
            opacity: 0; animation: fadeIn 1s ease 1s forwards; /* Delayed fade-in */
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* --- ATTRACTIVE FORM WITH ENHANCED EFFECTS --- */
        .main-grid {
            max-width: 1200px; margin: 0 auto; padding: 0 5%;
            display: grid; grid-template-columns: 1fr 1.6fr; gap: 80px;
            opacity: 0; animation: fadeInGrid 1s ease 1.5s forwards; /* Further delay */
        }

        @keyframes fadeInGrid {
            to { opacity: 1; transform: translateY(0); }
            from { opacity: 0; transform: translateY(30px); }
        }

        /* Contact Links with individual reveal animation */
        .contact-links { display: flex; flex-direction: column; gap: 25px; }
        .link-card {
            padding: 30px; border-radius: 25px; border: 1px solid #eee;
            display: flex; align-items: center; gap: 25px;
            text-decoration: none; color: var(--black);
            background: var(--white);
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; animation: revealCard 0.5s ease forwards;
        }

        .link-card:nth-child(1) { animation-delay: 1.8s; }
        .link-card:nth-child(2) { animation-delay: 2s; }
        .link-card:nth-child(3) { animation-delay: 2.2s; }

        @keyframes revealCard {
            to { opacity: 1; transform: translateX(0); }
            from { opacity: 0; transform: translateX(-20px); }
        }

        .link-card:hover { 
            border-color: var(--accent); 
            background: #fafafa; 
            transform: scale(1.03) translateX(10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
        }
        .link-card i { color: var(--accent); width: 28px; height: 28px; }

        /* Form Container with floating appearance */
        .form-container {
            position: relative;
            background: #fff; padding: 60px; border-radius: 40px;
            border: 1px solid #eee; box-shadow: 0 50px 100px rgba(0,0,0,0.05);
            transition: transform 0.1s ease-out, box-shadow 0.3s ease; /* Form Drift & Hover shadow */
            overflow: hidden; /* For inner particle effect */
        }

        .form-container:hover {
            box-shadow: 0 60px 120px rgba(0,0,0,0.1);
        }

        /* Subtle interactive background particles */
        .form-particles {
            position: absolute; inset: 0; pointer-events: none; opacity: 0.1;
        }
        .particle {
            position: absolute; background: var(--accent); border-radius: 50%;
            transition: transform 0.1s ease-out;
        }

        .form-group { position: relative; margin-bottom: 45px; }
        .form-input {
            width: 100%; padding: 12px 0; border: none;
            border-bottom: 2px solid #eee; font-family: inherit;
            font-size: 1.2rem; outline: none; transition: 0.3s;
            background: transparent;
        }
        .form-input:focus { border-color: var(--accent); }
        .form-label {
            position: absolute; top: 12px; left: 0; color: #999;
            font-size: 0.85rem; font-weight: 700; text-transform: uppercase;
            transition: 0.3s; pointer-events: none;
        }
        .form-input:focus ~ .form-label, .form-input:not(:placeholder-shown) ~ .form-label {
            top: -25px; color: var(--accent); font-size: 0.75rem;
        }

        /* --- MAGNETIC SUBMIT BUTTON WITH TEXT REVEAL --- */
        .btn-wrap { position: relative; margin-top: 50px; }
        .mag-btn {
            width: 100%; padding: 25px; background: var(--black);
            color: #fff; border: none; border-radius: 20px;
            font-weight: 700; cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 15px;
            transition: background 0.3s, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 1.1rem;
            position: relative; overflow: hidden;
        }

        /* Initial text state */
        .mag-btn span {
            display: inline-block; transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* Hover state with text reveal */
        .mag-btn:hover { background: var(--accent); }
        .mag-btn:hover span { transform: translateY(-100%); opacity: 0; }
        
        .mag-btn::after {
            content: 'Let\'s Craft!'; 
            height: 100%; display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; transition: transform 0.3s ease, top 0.3s ease;
        }
        .mag-btn:hover::after { transform: translateY(-100%); top: 0; }
        
        .mag-btn i { transition: transform 0.3s ease; }
        .mag-btn:hover i { transform: translateX(10px) rotate(-15deg); }

        /* --- ANIMATED SOCIAL PROOF / TRUSTED USERS --- */
        .social-proof {
            margin-top: 50px; border-top: 1px solid #eee; padding-top: 30px;
            display: flex; justify-content: space-between; align-items: center;
            opacity: 0; animation: fadeInGrid 1s ease 2.5s forwards; /* Final Delayed Fade-in */
        }
        .proof-text { font-size: 0.8rem; color: #777; font-weight: 500; }
        .proof-avatars { display: flex; }
        .proof-avatars img { 
            width: 35px; height: 35px; border-radius: 50%; border: 2px solid #fff; 
            margin-left: -12px; transition: transform 0.3s ease, z-index 0.3s ease; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .proof-avatars img:first-child { margin-left: 0; }
        
        /* Animated avatar effect on hover */
        .proof-avatars img:hover {
            transform: translateY(-10px) scale(1.2) rotate(10deg); z-index: 10;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 950px) {
            .hero-section { padding: 80px 5% 40px; }
            .hero-section h1 { font-size: 3.5rem; }
            .hero-section p { font-size: 1.1rem; margin-top: 20px; }
            .main-grid { grid-template-columns: 1fr; gap: 50px; }
            .form-container { padding: 40px 25px; }
            .form-particles { display: none; } /* Disable for performance on mobile */
        }
    </style>

    <script>
        lucide.createIcons();

        // --- ENHANCED MAGNETIC BUTTON & FORM EFFECT ---
        const magBtn = document.getElementById('mag-btn');
        const magForm = document.getElementById('mag-form');
        const particlesContainer = document.getElementById('form-particles');

        // Creates subtle interactive background particles
        function createParticles() {
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.width = `${Math.random() * 8 + 2}px`;
                particle.style.height = particle.style.width;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.dataset.depth = Math.random() * 0.4 + 0.1; /* For parallax feel */
                particlesContainer.appendChild(particle);
            }
        }
        createParticles();
        const particles = document.querySelectorAll('.particle');

        document.addEventListener('mousemove', (e) => {
            // 1. Magnetic Button Logic
            const btnPos = magBtn.getBoundingClientRect();
            const mouseXBtn = e.clientX - (btnPos.left + btnPos.width / 2);
            const mouseYBtn = e.clientY - (btnPos.top + btnPos.height / 2);

            // If mouse is near button (within 120px)
            if (Math.abs(mouseXBtn) < 120 && Math.abs(mouseYBtn) < 120) {
                magBtn.style.transform = `translate(${mouseXBtn * 0.35}px, ${mouseYBtn * 0.35}px)`;
            } else {
                magBtn.style.transform = `translate(0px, 0px)`;
            }

            // 2. Subtle Form Magnetic Drift
            const xForm = (window.innerWidth / 2 - e.clientX) / 60;
            const yForm = (window.innerHeight / 2 - e.clientY) / 60;
            magForm.style.transform = `rotateY(${xForm}deg) rotateX(${-yForm}deg)`;

            // 3. Interactive Particle Drift (Parallax effect)
            particles.forEach(p => {
                const depth = p.dataset.depth;
                p.style.transform = `translate(${mouseXBtn * depth}px, ${mouseYBtn * depth}px)`;
            });
        });

        // Submitting state for button
        const contactForm = document.getElementById('contactForm');
        contactForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const btnSpan = magBtn.querySelector('span');
            btnSpan.innerText = 'Crafting Message...';
            magBtn.style.pointerEvents = 'none';
            magBtn.style.opacity = '0.7';

            setTimeout(() => {
                alert('Your vision inquiry has been crafted! Done!');
                btnSpan.innerText = 'Send Message';
                magBtn.style.pointerEvents = 'auto';
                magBtn.style.opacity = '1';
                contactForm.reset();
            }, 2500); // Simulate network delay
        });
    </script>
</body>
</html>
