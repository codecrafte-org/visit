<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status | CodeCrafte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --blue: #0070f3; --black: #000; --white: #fff; --gray: #888; --bg: #fdfdfd; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--black); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Navbar Styling */
        nav { width: 100%; padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); position: fixed; top: 0; z-index: 100; }
        .logo img { height: 35px; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--black); font-size: 14px; font-weight: 500; opacity: 0.7; }
        .btn-contact { background: var(--black); color: var(--white); padding: 10px 24px; border-radius: 50px; text-decoration: none; font-size: 14px; font-weight: 600; }

        /* Error Content */
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding-top: 80px; }
        .error-container { max-width: 400px; text-align: center; padding: 20px; }
        .error-img { width: 160px; height: auto; margin-bottom: 20px; }
        .error-code { font-family: 'Syne', sans-serif; font-size: 3.5rem; line-height: 1; margin-bottom: 10px; }
        .error-msg { font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: 600; }
        .instructions { font-size: 0.85rem; color: var(--gray); line-height: 1.5; }

        /* Premium Toast */
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--black); color: var(--white); padding: 12px 20px; border-radius: 8px; display: flex; align-items: center; gap: 12px; font-size: 13px; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; }
        #toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 768px) { nav { justify-content: center; } .nav-links, .btn-contact { display: none; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><img src="/images/fav-ion.webp" alt="CC"></div>
        <div class="nav-links">
            <a href="../../index.html">Home</a>
            <a href="../Team.html">Our Team</a>
            <a href="../Story.html">Our Story</a>
        </div>
        <a href="../contact.html" class="btn-contact">Contact Us</a>
    </nav>

    <div class="main-content">
        <div class="error-container">
            <img src="/images/404.webp" alt="Lost" class="error-img">
            <div class="error-code">404</div>
            <h2 class="error-msg">Offline</h2>
            <p class="instructions">You're currently viewing the offline version. Please check your internet connection.</p>
        </div>
    </div>

    <div id="toast">
        <div id="t-icon"></div>
        <span id="t-msg"></span>
    </div>

    <script>
        lucide.createIcons();
        const toast = document.getElementById('toast');
        
        function showToast(status) {
            if (status === 'online') {
                document.getElementById('t-msg').innerText = "Connection restored. Returning...";
                document.getElementById('t-icon').innerHTML = '<i data-lucide="wifi" style="color:#00ff88; width:18px;"></i>';
                toast.classList.add('show');
                
                // Smart Redirect
                const lastUrl = sessionStorage.getItem('last_url');
                setTimeout(() => {
                    window.location.href = lastUrl ? lastUrl : "/index.html";
                }, 2000);
            } else {
                document.getElementById('t-msg').innerText = "Still offline. Check connection.";
                document.getElementById('t-icon').innerHTML = '<i data-lucide="wifi-off" style="color:#ff4b4b; width:18px;"></i>';
                toast.classList.add('show');
            }
            lucide.createIcons();
        }

        window.addEventListener('online', () => showToast('online'));
        
        // Mobile Fix: Agar load par hi net ho to foran wapis jao
        window.addEventListener('load', () => {
            if (navigator.onLine) {
                const lastUrl = sessionStorage.getItem('last_url');
                if(lastUrl) window.location.href = lastUrl;
            }
        });
    </script>
</body>
</html>
