<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Development | CodeCrafte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --blue: #0070f3; --black: #000; --white: #fff; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--white); color: var(--black); overflow-x: hidden; font-family: 'Inter', sans-serif; }

        .hero {
            height: 100vh;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            align-items: center;
            padding: 0 8%;
            position: relative;
        }

        /* --- Left Side: Sleek Typography --- */
        .sub-heading {
            font-family: 'Syncopate', sans-serif;
            font-size: 12px;
            letter-spacing: 8px;
            color: var(--blue);
            margin-bottom: 20px;
            display: block;
        }

        .ultra-heading {
            font-size: clamp(3.5rem, 9vw, 8rem);
            line-height: 0.85;
            letter-spacing: -6px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .blue-outline {
            -webkit-text-stroke: 1.5px var(--blue);
            color: transparent;
        }

        .hero-p {
            margin-top: 35px;
            font-size: 1.1rem;
            max-width: 450px;
            color: #555;
            line-height: 1.5;
            border-left: 3px solid var(--blue);
            padding-left: 20px;
        }

        /* --- Right Side: The 3D Floating iPhone --- */
        .phone-container {
            position: relative;
            perspective: 1200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .iphone {
            width: 280px;
            height: 580px;
            background: #111;
            border-radius: 50px;
            border: 8px solid #222;
            position: relative;
            transform-style: preserve-3d;
            box-shadow: 0 50px 100px rgba(0,0,0,0.2);
            transition: transform 0.1s ease-out;
        }

        /* The Notch */
        .iphone::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 25px;
            background: #222;
            border-radius: 20px;
            z-index: 10;
        }

        /* Screen Content */
        .screen {
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            background: #fff;
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .app-ui-circle {
            width: 100px; height: 100px;
            background: var(--blue);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        /* Floating UI Elements around phone */
        .ui-element {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            z-index: 5;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .hero { grid-template-columns: 1fr; text-align: center; padding-top: 100px; }
            .phone-container { margin-top: 50px; transform: scale(0.8); }
            .hero-p { margin: 30px auto; text-align: left; }
            .ultra-heading { letter-spacing: -3px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="content">
            <span class="sub-heading">02 // APP ARCHITECTURE</span>
            <h1 class="ultra-heading">
                MOBILE <br>
                <span class="blue-outline">NATIVE</span> <br>
                POWER.
            </h1>
            <p class="hero-p">
                Hum sirf apps nahi banate, hum "High-Performance Engines" create karte hain jo iOS aur Android par smooth chaltay hain.
            </p>
        </div>

        <div class="phone-container" id="scene">
            <div class="ui-element" style="top: 10%; right: -20px;">⚡ 60 FPS</div>
            <div class="ui-element" style="bottom: 20%; left: -40px;">🛡️ SECURE</div>
            
            <div class="iphone" id="iphone">
                <div class="screen">
                    <div class="app-ui-circle"></div>
                    <p style="margin-top: 20px; font-weight: 900; color: #000; letter-spacing: -1px;">CODECRAFTE</p>
                    <div style="width: 60%; height: 4px; background: #eee; margin-top: 10px; border-radius: 10px;">
                        <div style="width: 70%; height: 100%; background: var(--blue); border-radius: 10px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Entrance Animation
        gsap.from(".ultra-heading", { x: -100, opacity: 0, duration: 1.5, ease: "expo.out" });
        gsap.from(".iphone", { y: 100, opacity: 0, duration: 1.5, delay: 0.2, ease: "power4.out" });

        // 3D Mouse Interaction
        const scene = document.body;
        const iphone = document.getElementById('iphone');

        scene.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 20;
            const y = (window.innerHeight / 2 - e.pageY) / 20;
            
            gsap.to(iphone, {
                rotationY: x,
                rotationX: -y,
                duration: 1,
                ease: "power2.out"
            });
        });

        // Floating UI animation
        gsap.to(".ui-element", {
            y: 20,
            duration: 2,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut",
            stagger: 0.5
        });
    </script>


<!--pricingggggggggggggggggggggggggg-->



</body>
</html>
